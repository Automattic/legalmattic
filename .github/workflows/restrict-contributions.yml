name: Restrict contributions to Automattic team

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-non-member:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const obj = isPR ? context.payload.pull_request : context.payload.issue;
            const association = obj.author_association;
            const senderType = context.payload.sender.type;

            const allowed = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            if (allowed.includes(association)) {
              core.info(`Skipping: author_association=${association}`);
              return;
            }
            if (senderType === 'Bot') {
              core.info('Skipping: sender is a bot');
              return;
            }

            const number = obj.number;
            const author = context.payload.sender.login;

            const body = [
              `Hi @${author}, thanks for your interest in legalmattic.`,
              ``,
              `This repository is the public source of Automattic's legal documents`,
              `and only accepts changes from Automattic team members. We can't review`,
              `or merge external contributions here.`,
              ``,
              `If you spotted something worth flagging, please reach out via`,
              `[Automattic support](https://wordpress.com/help/contact).`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              state: 'closed',
              state_reason: 'not_planned',
            });
